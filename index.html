<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Budget Tracker</title>

  <meta name="theme-color" content="#101114">
  <meta name="apple-mobile-web-app-title" content="Budget Tracker">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="phone-app">

    <header class="app-header">
      <div>
        <div class="mini-label">Family Budget</div>
        <h1>Budget</h1>
      </div>

      <select id="monthSelect" class="month-select"></select>
    </header>

    <main class="app-main">

      <section id="setupCard" class="sheet-card hidden">
        <div class="section-title">Choose user</div>
        <select id="userSelect"></select>
        <button id="continueBtn">Continue</button>
      </section>

      <section id="mainApp" class="hidden">

        <div id="userButtons" class="user-buttons"></div>

        <div id="favoriteButtons" class="favorite-buttons"></div>

        <section id="heroCard" class="hero-card hidden">
          <div class="hero-top">
            <div>
              <div class="mini-label">Selected</div>
              <div id="previewCategory" class="hero-category"></div>
            </div>
            <div class="hero-balance">
              <div class="mini-label">Balance</div>
              <div id="previewBalance" class="balance-amount"></div>
            </div>
          </div>

          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>

          <div class="stats-grid">
            <div>
              <span>Budget</span>
              <strong id="previewBudget"></strong>
            </div>
            <div>
              <span>Spent</span>
              <strong id="previewSpent"></strong>
            </div>
          </div>
        </section>

        <section class="input-panel">
          <label>
            <span>Category</span>
            <select id="categorySelect"></select>
          </label>

          <label>
            <span>Amount</span>
            <input id="amountInput" type="number" inputmode="decimal" placeholder="0.00">
          </label>

          <button id="addBtn">Add Expense</button>
        </section>

        <div id="message" class="toast hidden"></div>

      </section>

    </main>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
