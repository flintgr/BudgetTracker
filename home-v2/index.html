<!doctype html>
<html lang="el">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Family Budget — Home V2 Phase 5 Integration</title>
<link rel="stylesheet" href="home-v2.css">
</head>
<body>
<main class="app">
<header class="header">
      <div><span>Family Budget</span><h1>Home</h1></div>
      <div class="month-picker-v2">
        <button id="monthPill" type="button">Loading...</button>
        <div id="monthMenuV2" class="month-menu-v2 hidden"></div>
      </div>
    </header>

<div id="homeView"><section class="summary">
<article class="card income"><i></i><div class="icon">⌄</div><strong id="incomeValue">€0.00</strong><span>Income</span><small>Monthly income</small></article>
<article class="card expenses"><i></i><div class="icon">◇</div><strong id="expensesValue">€0.00</strong><span>Expenses</span><small id="expensesMeta">0% of income</small></article>
<article class="card available"><i></i><div class="icon">▣</div><strong id="availableValue">€0.00</strong><span>Available</span><small id="availableMeta">0% remaining</small></article>
</section>

<section class="quick">
<div class="title"><h2>Quick Categories</h2><button id="editQuickBtn" type="button">✎</button></div>
<div id="quickCategories" class="chips"><button class="chip active"><span>…</span><strong>Loading</strong></button></div>
</section>

<section class="amount">
<div class="amount-title"><label>Amount</label><span>EUR</span></div>
<div class="amount-field"><span>€</span><input id="amountInputV2" placeholder="0,00" inputmode="decimal"></div>
<button id="addExpenseBtnV2" class="add" type="button"><span>＋</span>Add Expense</button>
</section>

<details class="advanced">
      <summary>Advanced</summary>
      <div class="advanced-content">
        <div id="userButtonsV2" class="user-grid-v2"></div>
        <select id="categorySelectV2"></select>
      </div>
    </details>

    <div id="homeMessage" class="home-message hidden"></div>

</div>

    <section id="settingsView" class="settings-view hidden">
      <div class="settings-head">
        <div>
          <span>Home V2</span>
          <h2>Quick Categories</h2>
        </div>
        <button id="closeSettingsBtn" type="button">Done</button>
      </div>
      <p>Select up to 8 categories. Changes are saved on this device.</p>
      <div id="quickCategorySettings" class="settings-list"></div>
    </section>

    <nav>
      <button id="homeNavBtn" class="active" type="button">⌂<span>Home</span></button>
      <button id="historyNavBtn" type="button">☷<span>History</span></button>
      <button id="dashboardNavBtn" type="button">▤<span>Dashboard</span></button>
      <button id="settingsNavBtn" type="button">⚙<span>Settings</span></button>
    </nav>
</main>
<script src="config.js"></script>
<script src="home-v2.js"></script>
</body>
</html>
